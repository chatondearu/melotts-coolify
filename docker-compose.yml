services:
  melotts:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MELOTTS_REPO: ${MELOTTS_REPO:-https://github.com/myshell-ai/MeloTTS.git}
        MELOTTS_REF: ${MELOTTS_REF:-main}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    image: ${MELOTTS_IMAGE:-melotts-coolify:local}
    container_name: ${SERVICE_NAME:-melotts}
    restart: unless-stopped
    environment:
      - OUTPUT_DIR=${OUTPUT_DIR:-/app/output}
    volumes:
      - ${OUTPUT_HOST_DIR:-./output}:/app/output
    # Routing/TLS: configure the service domain in Coolify (e.g. https://tts.example.com:8888 — :8888 is the container port MeloTTS uses).
    # Do not duplicate Traefik router rules here; Coolify merges its proxy labels with the ones below.
    # Basic Auth middleware only (Coolify attaches it to the generated router): https://coolify.io/docs/knowledge-base/proxy/traefik/basic-auth#docker-compose-and-services
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.melotts-auth.basicauth.users=${TRAEFIK_BASIC_AUTH_USERS:?Set TRAEFIK_BASIC_AUTH_USERS for Traefik Basic Auth (see docs/access-control.md)}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
