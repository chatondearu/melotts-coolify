services:
  melotts:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MELOTTS_REPO: ${MELOTTS_REPO:-https://github.com/myshell-ai/MeloTTS.git}
        MELOTTS_REF: ${MELOTTS_REF:-main}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    image: ${MELOTTS_IMAGE:-melotts-coolify:local}
    container_name: ${SERVICE_NAME:-melotts}
    restart: unless-stopped
    environment:
      # Coolify: declare SERVICE_FQDN_MELOTTS (no value) so the platform injects the real FQDN for Traefik — see docs/coolify.md
      - SERVICE_FQDN_MELOTTS
      - OUTPUT_DIR=${OUTPUT_DIR:-/app/output}
    volumes:
      - ${OUTPUT_HOST_DIR:-./output}:/app/output
    # Traefik backend port must match the upstream image (MeloTTS listens on 8888).
    labels:
      - traefik.enable=true
      # Coolify Traefik uses entrypoint "https" (not "websecure"). Host must be a real FQDN: Coolify sets SERVICE_FQDN_MELOTTS; locally use TRAEFIK_SUBDOMAIN + DOMAIN via the fallback below.
      - traefik.http.routers.melotts.rule=Host(`${SERVICE_FQDN_MELOTTS:-${TRAEFIK_SUBDOMAIN}.${DOMAIN}}`)
      - traefik.http.routers.melotts.entrypoints=https
      - traefik.http.routers.melotts.tls.certresolver=letsencrypt
      - traefik.http.services.melotts.loadbalancer.server.port=8888
      # Basic Auth on by default for Coolify (Gradio has no login). Set TRAEFIK_BASIC_AUTH_USERS.
      # In .env files, double every $ in the hash (see docs/access-control.md).
      # To disable: remove the middlewares router label and the two melotts-auth middleware labels below.
      - traefik.http.routers.melotts.middlewares=melotts-auth
      - traefik.http.middlewares.melotts-auth.basicauth.users=${TRAEFIK_BASIC_AUTH_USERS:?Set TRAEFIK_BASIC_AUTH_USERS for Traefik Basic Auth (see docs/access-control.md)}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
