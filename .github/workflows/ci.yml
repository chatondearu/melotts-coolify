name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Coolify stack (docker-compose.yml)
        env:
          MELOTTS_REPO: https://github.com/myshell-ai/MeloTTS.git
          MELOTTS_REF: main
          MELOTTS_IMAGE: melotts-coolify:local
          SERVICE_NAME: melotts
          TRAEFIK_SUBDOMAIN: tts
          DOMAIN: example.com
          OUTPUT_HOST_DIR: ./output
          OUTPUT_DIR: /app/output
          TRAEFIK_NETWORK: traefik_network
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate local stack (docker-compose.local.yml)
        env:
          MELOTTS_REPO: https://github.com/myshell-ai/MeloTTS.git
          MELOTTS_REF: main
          MELOTTS_IMAGE: melotts-coolify:local
          SERVICE_NAME: melotts
          OUTPUT_HOST_DIR: ./output
          OUTPUT_DIR: /app/output
          HOST_PORT: "8888"
        run: docker compose -f docker-compose.local.yml config --quiet
